<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win 999 - Withdraw</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#000;
color:#fff;
padding:16px;
}

/* HEADER */
.header{
font-size:22px;
font-weight:600;
margin-bottom:15px;
}

/* CARD */
.card{
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(34,197,94,0.2);
box-shadow:0 20px 80px rgba(0,0,0,0.9);
margin-bottom:20px;
}

/* INPUT */
.input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#020617;
color:#fff;
margin-bottom:15px;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#fff;
font-weight:600;
cursor:pointer;
}

/* NOTICE (TOP TOAST) */
.toast{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:14px 20px;
border-radius:20px;
border:1px solid #22c55e;
box-shadow:0 0 20px #22c55e44;
transition:0.4s;
z-index:10;
}

.toast.show{
top:20px;
}

/* HISTORY */
.historyTitle{
margin:15px 0 10px;
font-size:15px;
opacity:0.7;
}

.history{
display:flex;
flex-direction:column;
gap:10px;
}

/* ITEM */
.item{
padding:14px;
border-radius:16px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

/* STATUS */
.status{
font-size:12px;
color:#facc15;
}

/* DOT LOADER */
.dot{
width:6px;
height:6px;
background:#facc15;
border-radius:50%;
display:inline-block;
animation:blink 1s infinite;
margin-left:3px;
}

@keyframes blink{
0%,100%{opacity:0.3;}
50%{opacity:1;}
}
</style>
</head>

<body>

<div class="header">Withdraw</div>

<div class="card">
<input type="text" id="upi" class="input" placeholder="Enter UPI ID">
<button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">Withdrawal Submitted</div>

<!-- HISTORY -->
<div class="historyTitle">Recent Transactions</div>

<div class="history" id="history"></div>

<script>
function withdraw(){
let upi=document.getElementById("upi").value;

if(upi==""){
alert("Enter UPI ID");
return;
}

/* SHOW TOAST */
let t=document.getElementById("toast");
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},3000);

/* ADD HISTORY ITEM */
let h=document.getElementById("history");

let div=document.createElement("div");
div.className="item";

let time=new Date().toLocaleTimeString();

div.innerHTML=`
<div>
<div>₹250</div>
<div style="font-size:11px;opacity:0.6">${time}</div>
</div>
<div class="status">
Processing
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>
`;

h.prepend(div);
}
</script>

</body>
</html>
