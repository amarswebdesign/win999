<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win 999 - Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#fff;
overflow:hidden;
}

/* BACKGROUND GLOW */
.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 20%,#facc1520,transparent 40%),
radial-gradient(circle at 70% 80%,#f59e0b20,transparent 40%);
animation:bgMove 10s ease-in-out infinite alternate;
z-index:-1;
}

@keyframes bgMove{
0%{transform:scale(1);}
100%{transform:scale(1.12);}
}

/* CARD */
.card{
width:90%;
max-width:360px;
padding:32px 22px;
border-radius:30px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(40px);
border:1px solid rgba(250,204,21,0.25);
box-shadow:
0 0 40px rgba(250,204,21,0.15),
0 40px 120px rgba(0,0,0,0.9),
inset 0 0 25px rgba(255,255,255,0.03);
animation:fadeUp 0.9s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(50px);}
to{opacity:1;transform:translateY(0);}
}

/* BONUS BADGE */
.badge{
display:inline-block;
padding:6px 14px;
border-radius:20px;
background:linear-gradient(135deg,#facc15,#f59e0b);
color:#000;
font-size:12px;
font-weight:600;
margin-bottom:15px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(250,204,21,0.4);}
50%{box-shadow:0 0 20px rgba(250,204,21,0.7);}
100%{box-shadow:0 0 0 rgba(250,204,21,0.4);}
}

/* TITLE */
h2{
font-weight:600;
margin-bottom:5px;
}

.sub{
font-size:13px;
opacity:0.65;
margin-bottom:20px;
}

/* INPUT */
.inputBox{
background:#020617;
border-radius:14px;
padding:14px;
margin-bottom:14px;
border:1px solid transparent;
transition:0.25s;
}

.inputBox:focus-within{
border:1px solid #facc15;
box-shadow:0 0 12px #facc1533;
}

.inputBox input{
width:100%;
background:none;
border:none;
outline:none;
color:#fff;
font-size:14px;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#facc15,#f59e0b);
color:#000;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:0.25s;
}

.btn:hover{
transform:translateY(-1px) scale(1.03);
box-shadow:0 10px 25px rgba(250,204,21,0.35);
}

.btn:active{
transform:scale(0.96);
}

/* SWITCH */
.switch{
margin-top:16px;
font-size:13px;
opacity:0.7;
text-align:center;
cursor:pointer;
}

.switch span{
color:#facc15;
}

/* HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<!-- REGISTER DEFAULT -->
<div id="registerBox">

<div class="badge">🎁 Signup Bonus ₹250</div>

<h2>Create Account</h2>
<div class="sub">Start your premium journey</div>

<div class="inputBox">
<input type="text" id="regUser" placeholder="Username">
</div>

<div class="inputBox">
<input type="password" id="regPass" placeholder="Password">
</div>

<button class="btn" onclick="register()">Register</button>

<div class="switch" onclick="showLogin()">
Already have account? <span>Login</span>
</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="hidden">

<h2>Welcome Back</h2>
<div class="sub">Login to continue</div>

<div class="inputBox">
<input type="text" id="loginUser" placeholder="Username">
</div>

<div class="inputBox">
<input type="password" id="loginPass" placeholder="Password">
</div>

<button class="btn" onclick="login()">Login</button>

<div class="switch" onclick="showRegister()">
Don't have account? <span>Register</span>
</div>

</div>

</div>

<script>
function showLogin(){
document.getElementById("registerBox").classList.add("hidden");
document.getElementById("loginBox").classList.remove("hidden");
}

function showRegister(){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("registerBox").classList.remove("hidden");
}

function register(){
let u=document.getElementById("regUser").value;
let p=document.getElementById("regPass").value;

if(u=="" || p==""){
alert("Enter details");
return;
}

localStorage.setItem("user",u);
localStorage.setItem("pass",p);

window.location="bonus.html";
}

function login(){
let u=document.getElementById("loginUser").value;
let p=document.getElementById("loginPass").value;

if(u==localStorage.getItem("user") && p==localStorage.getItem("pass")){
window.location="bonus.html";
}else{
alert("Invalid login");
}
}
</script>

</body>
</html>
