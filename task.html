<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win 999 - Tasks</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#000;
color:#fff;
padding:15px;
overflow-x:hidden;
}

/* ===== TOP BAR ===== */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

/* WITHDRAW */
.withdraw{
padding:10px 18px;
border:none;
border-radius:25px;
font-size:13px;
font-weight:600;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#fff;
opacity:0.3;
backdrop-filter:blur(10px);
transition:0.4s;
}

.withdraw.active{
opacity:1;
box-shadow:0 0 25px #22c55e;
transform:scale(1.05);
}

/* BALANCE */
.balance{
padding:18px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(250,204,21,0.3);
box-shadow:0 20px 60px rgba(0,0,0,0.8);
margin-bottom:15px;
animation:fadeUp 0.6s ease;
}

.amount{
font-size:30px;
color:#facc15;
font-weight:700;
transition:0.3s;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:18px;
padding:14px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 40px rgba(0,0,0,0.9);
transform:translateY(30px);
opacity:0;
animation:fadeUp 0.5s forwards;
}

.card:nth-child(1){animation-delay:0.1s;}
.card:nth-child(2){animation-delay:0.2s;}
.card:nth-child(3){animation-delay:0.3s;}
.card:nth-child(4){animation-delay:0.4s;}
.card:nth-child(5){animation-delay:0.5s;}
.card:nth-child(6){animation-delay:0.6s;}
.card:nth-child(7){animation-delay:0.7s;}
.card:nth-child(8){animation-delay:0.8s;}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* TEXT */
.title{font-size:13px;font-weight:600;}
.reward{font-size:11px;opacity:0.6;margin:6px 0;}

/* BUTTON */
.btn{
display:inline-block;
padding:6px 12px;
border-radius:15px;
background:linear-gradient(135deg,#facc15,#f59e0b);
color:#000;
font-size:11px;
font-weight:600;
text-decoration:none;
}

/* DONE */
.done{
background:#16a34a !important;
color:#fff !important;
}

/* CHECK */
.check{
position:absolute;
top:8px;
right:10px;
font-size:16px;
color:#22c55e;
opacity:0;
transition:0.3s;
}

.completed .check{
opacity:1;
}

/* ANIM */
@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="topbar">
<div style="font-size:18px;font-weight:600;">💼 Tasks</div>
<button class="withdraw" id="withdrawBtn">Withdraw</button>
</div>

<div class="balance">
<div>Total Balance</div>
<div class="amount" id="balance">₹250</div>
</div>

<div class="grid" id="grid"></div>

<script>
let balance = 250;
let completed = 0;
let lastClicked = null;

const links = [
"https://t.me/+oU-QbbREjx81NzE1",
"https://t.me/+PKqs7oM1XA05M2Vl",
"https://t.me/+r72-luRvSXUyOTA9",
"https://t.me/+0kOI-4T16pRkNDM1",
"https://t.me/+IyBMvFx76CVlY2I1",
"https://t.me/+4nIg5ue0RNxiOWQ1",
"https://t.me/addlist/arDUJy-LVjM5ZjJl",
"https://t.me/+AzW2HTDVWVtlMGI1"
];

const grid = document.getElementById("grid");

/* CREATE CARDS */
links.forEach((link,i)=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="check">✔</div>
<div class="title">Task ${i+1}</div>
<div class="reward">Earn ₹20</div>
<a href="${link}" target="_blank" class="btn">Open</a>
`;

let btn = card.querySelector(".btn");

btn.addEventListener("click",()=>{
lastClicked = {card, btn};
});

grid.appendChild(card);
});

/* AUTO COMPLETE WHEN USER RETURNS */
window.addEventListener("focus", ()=>{
if(lastClicked){
let {card, btn} = lastClicked;

if(!btn.classList.contains("done")){
btn.textContent="Done";
btn.classList.add("done");

card.classList.add("completed");

balance+=20;
completed++;

let bal=document.getElementById("balance");
bal.textContent="₹"+balance;
bal.style.transform="scale(1.2)";
setTimeout(()=>bal.style.transform="scale(1)",200);

if(completed>=6){
let w=document.getElementById("withdrawBtn");
w.classList.add("active");
w.onclick=()=>window.location="withdraw.html";
}
}

lastClicked=null;
}
});
</script>

</body>
</html>
